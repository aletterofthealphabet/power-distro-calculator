services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: distro
      POSTGRES_PASSWORD: distro
      POSTGRES_DB: power_distro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U distro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
